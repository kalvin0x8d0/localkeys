services:
  # MongoDB service
  mongodb:
    image: mongo:7.0
    container_name: localkeys_mongodb
    ports:
      # Maps HOST_PORT:CONTAINER_PORT
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: localkeys
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - localkeys_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localkeys_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      MONGO_URL: mongodb://admin:password@mongodb:27017/localkeys?authSource=admin
      DB_NAME: localkeys
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: INFO
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - localkeys_network
    volumes:
      - ./backend:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Passes the API URL to React during the build phase
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    container_name: localkeys_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - localkeys_network

volumes:
  mongo_data:
  mongo_config:

networks:
  localkeys_network:
    driver: bridge
