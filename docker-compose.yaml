services:
  # MongoDB service
  mongodb:
    image: mongo:7.0
    container_name: localkeys_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: localkeys
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - localkeys_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localkeys_backend
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://admin:password@mongodb:27017/localkeys?authSource=admin
      DB_NAME: localkeys
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: INFO
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - localkeys_network
    volumes:
      - ./backend:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: localkeys_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - localkeys_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
  mongo_config:

networks:
  localkeys_network:
    driver: bridge
